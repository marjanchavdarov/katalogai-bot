<!DOCTYPE html>
<html>
<head>
    <title>Upload Catalog</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 50px auto; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input, button { padding: 8px; width: 100%; }
        button { background: #4CAF50; color: white; border: none; cursor: pointer; }
        #status { margin-top: 20px; padding: 10px; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <h1>📸 Upload Catalog PDF</h1>
    
    <form id="uploadForm">
        <div class="form-group">
            <label>Store Name:</label>
            <input type="text" name="store" required placeholder="e.g., Kaufland">
        </div>
        
        <div class="form-group">
            <label>Valid From:</label>
            <input type="date" name="valid_from" required>
        </div>
        
        <div class="form-group">
            <label>Valid Until:</label>
            <input type="date" name="valid_until" required>
        </div>
        
        <div class="form-group">
            <label>PDF File:</label>
            <input type="file" name="file" accept=".pdf" required>
        </div>
        
        <button type="submit">Upload & Process</button>
    </form>
    
    <div id="status"></div>

    <script>
        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const statusDiv = document.getElementById('status');
            
            statusDiv.innerHTML = 'Uploading...';
            
            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const text = decoder.decode(value);
                    const lines = text.split('\n').filter(l => l.trim());
                    
                    for (const line of lines) {
                        try {
                            const data = JSON.parse(line);
                            statusDiv.innerHTML = JSON.stringify(data, null, 2);
                        } catch (e) {
                            statusDiv.innerHTML += '<br>' + line;
                        }
                    }
                }
            } catch (error) {
                statusDiv.innerHTML = 'Error: ' + error.message;
            }
        };
    </script>
</body>
</html>
