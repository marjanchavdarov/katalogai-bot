<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>katalog.ai Upload</title>
<style>
body{font-family:monospace;background:#111;color:#eee;padding:40px;max-width:700px;margin:0 auto}
h1{color:#00ff88}
input, .file-input-wrapper{background:#222;border:1px solid #444;color:#eee;padding:8px;width:100%;margin:5px 0 15px 0;font-family:monospace;display:block;box-sizing:border-box}
.file-input-wrapper{padding:0;overflow:hidden}
.file-input-wrapper input[type=file]{border:none;margin:0;padding:10px;background:#1a1a1a}
.file-input-wrapper input[type=file]:hover{background:#333}
label{color:#aaa;font-size:13px}
button{background:#00ff88;color:#000;border:none;padding:15px;font-weight:bold;font-size:16px;cursor:pointer;width:100%;margin-top:10px}
button:disabled{background:#444;color:#888;cursor:not-allowed}
#log{background:#000;padding:20px;margin-top:20px;min-height:100px;font-size:12px;line-height:1.8;white-space:pre-wrap;overflow:auto;max-height:400px}
#bar-wrap{background:#222;height:24px;margin-top:10px;display:none;border-radius:4px;overflow:hidden}
#fill{background:#00ff88;height:24px;width:0%;transition:width 0.5s;display:flex;align-items:center;justify-content:center;font-size:11px;color:#000;font-weight:bold}
</style>
</head>
<body>
<h1>katalog.ai - Upload</h1>

<div style="background:#222;padding:15px;margin:20px 0;border-left:3px solid #00ff88;font-size:13px">
    Select your PDF catalogue, fill in the details, and click Process.
</div>

<label>PDF File:</label>
<div class="file-input-wrapper">
    <input type="file" id="fileInput" accept=".pdf">
</div>

<label>Store:</label>
<input type="text" id="storeInput" placeholder="Lidl" value="Lidl">

<label>Valid From (YYYY-MM-DD):</label>
<input type="text" id="validFromInput" placeholder="2026-03-02" value="2026-03-02">

<label>Valid Until (empty = 14 days auto):</label>
<input type="text" id="validUntilInput" placeholder="2026-03-16" value="">

<label>Resume Job ID (optional):</label>
<input type="text" id="resumeJobInput" placeholder="leave empty for new upload" value="23c909ed">

<button id="processBtn" onclick="handleUpload()">Process</button>

<div id="bar-wrap"><div id="fill">0%</div></div>
<div id="log">Ready. Make sure the backend is running.</div>

<script>
// Get DOM elements with safe fallbacks
const getElement = (id) => {
    const el = document.getElementById(id);
    if (!el) console.warn(`Element #${id} not found`);
    return el;
};

// Store references to elements
const fileInput = getElement('fileInput');
const storeInput = getElement('storeInput');
const validFromInput = getElement('validFromInput');
const validUntilInput = getElement('validUntilInput');
const resumeJobInput = getElement('resumeJobInput');
const processBtn = getElement('processBtn');
const logEl = getElement('log');
const barWrap = getElement('bar-wrap');
const fillEl = getElement('fill');

// Polling variables
let pollInterval = null;
let lastPage = 0;
let lastProducts = 0;
let totalPages = 0;

// Logging function
function log(message) {
    if (logEl) {
        logEl.textContent += message + '\n';
        logEl.scrollTop = logEl.scrollHeight;
    }
    console.log(message);
}

// Main upload function
async function handleUpload() {
    try {
        // Clear any existing poll interval
        if (pollInterval) {
            clearInterval(pollInterval);
            pollInterval = null;
        }
        
        // Get values
        const file = fileInput?.files[0];
        const store = storeInput?.value.trim();
        let validFrom = validFromInput?.value.trim();
        let validUntil = validUntilInput?.value.trim();
        const resumeJob = resumeJobInput?.value.trim();
        
        // Validate
        if (!file) { alert('Please select a PDF file'); return; }
        if (!store) { alert('Please enter store name'); return; }
        if (!validFrom) { alert('Please enter valid from date'); return; }
        
        // Validate date format
        if (!validFrom.match(/^\d{4}-\d{2}-\d{2}$/)) {
            alert('Valid From must be in YYYY-MM-DD format');
            return;
        }
        
        // Auto-calculate valid until if empty
        if (!validUntil) {
            const fromDate = new Date(validFrom + 'T12:00:00');
            fromDate.setDate(fromDate.getDate() + 14);
            validUntil = fromDate.toISOString().split('T')[0];
            if (validUntilInput) validUntilInput.value = validUntil;
        } else if (!validUntil.match(/^\d{4}-\d{2}-\d{2}$/)) {
            alert('Valid Until must be in YYYY-MM-DD format');
            return;
        }
        
        // Disable button
        if (processBtn) {
            processBtn.disabled = true;
            processBtn.textContent = 'Processing...';
        }
        
        // Clear log
        if (logEl) logEl.textContent = '';
        
        // Show progress bar
        if (barWrap) barWrap.style.display = 'block';
        if (fillEl) {
            fillEl.style.width = '0%';
            fillEl.textContent = '0%';
        }
        
        // Reset counters
        lastPage = 0;
        lastProducts = 0;
        
        // Log details
        log(`File: ${file.name}`);
        log(`Store: ${store}`);
        log(`Valid from: ${validFrom}`);
        log(`Valid until: ${validUntil}`);
        if (resumeJob) log(`Resuming job: ${resumeJob}`);
        log('─────────────────────────────');
        
        // Create FormData
        const formData = new FormData();
        formData.append('file', file);
        formData.append('store', store);
        formData.append('valid_from', validFrom);
        formData.append('valid_until', validUntil);
        if (resumeJob) formData.append('resume_job_id', resumeJob);
        
        // Send upload request
        const response = await fetch('/upload', {
            method: 'POST',
            body: formData
        });
        
        if (!response.ok) {
            const errorText = await response.text();
            throw new Error(`Server error (${response.status}): ${errorText}`);
        }
        
        // Handle streaming response
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        
        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            
            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop() || '';
            
            for (const line of lines) {
                if (!line.trim()) continue;
                
                try {
                    const data = JSON.parse(line);
                    
                    switch (data.type) {
                        case 'start':
                            totalPages = data.pages;
                            log(`Processing ${totalPages} pages...`);
                            break;
                            
                        case 'page':
                            log(`Page ${data.page}/${data.total_pages}: ${data.products_found} products found`);
                            if (fillEl) {
                                const pct = Math.round((data.page / data.total_pages) * 100);
                                fillEl.style.width = pct + '%';
                                fillEl.textContent = pct + '%';
                            }
                            break;
                            
                        case 'done':
                            log('─────────────────────────────');
                            log(`✓ DONE! ${data.products} products saved from ${data.pages} pages!`);
                            if (fillEl) {
                                fillEl.style.width = '100%';
                                fillEl.textContent = '100% DONE!';
                            }
                            if (processBtn) {
                                processBtn.disabled = false;
                                processBtn.textContent = 'Process Another';
                            }
                            break;
                            
                        case 'error':
                            log(`❌ ERROR: ${data.message}`);
                            if (processBtn) {
                                processBtn.disabled = false;
                                processBtn.textContent = 'Try Again';
                            }
                            break;
                            
                        case 'page_error':
                            log(`⚠️ Page ${data.page} error: ${data.error}`);
                            break;
                            
                        default:
                            log(`Unknown message: ${JSON.stringify(data)}`);
                    }
                } catch (e) {
                    log(`Parse error: ${e.message} - Raw: ${line}`);
                }
            }
        }
        
    } catch (error) {
        log(`❌ ERROR: ${error.message}`);
        console.error('Upload error:', error);
        
        if (processBtn) {
            processBtn.disabled = false;
            processBtn.textContent = 'Try Again';
        }
    }
}

// Add file selection feedback
if (fileInput) {
    fileInput.addEventListener('change', function() {
        if (this.files[0]) {
            log(`Selected: ${this.files[0].name} (${Math.round(this.files[0].size/1024)} KB)`);
        }
    });
}

// Add keyboard shortcut for testing (Ctrl+Shift+T)
document.addEventListener('keydown', function(e) {
    if (e.ctrlKey && e.shiftKey && e.key === 'T') {
        e.preventDefault();
        fetch('/')
            .then(r => r.json())
            .then(data => log(`✅ Backend status: ${JSON.stringify(data)}`))
            .catch(err => log(`❌ Backend not reachable: ${err.message}`));
    }
});

// Initial log
log('Ready. Select a PDF and click Process.');
</script>
</body>
</html>
